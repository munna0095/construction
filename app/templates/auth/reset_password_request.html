{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="text-center mb-4">Reset Password</h3>
                <p class="text-center text-muted mb-4">Enter your email address and we will send you a link to reset your password.</p>
                <form action="{{ url_for('auth.reset_password_request') }}" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" name="email" class="form-control" id="email" required placeholder="Enter your registered email">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Request Password Reset</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
